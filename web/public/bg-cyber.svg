<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="night-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="40%" stop-color="#090d1a"/>
      <stop offset="100%" stop-color="#020508"/>
    </linearGradient>
    <linearGradient id="grass-night" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a2e0a"/>
      <stop offset="50%" stop-color="#133d13"/>
      <stop offset="100%" stop-color="#0a2e0a"/>
    </linearGradient>
    <linearGradient id="dirt-night" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a2510"/>
      <stop offset="100%" stop-color="#2e1508"/>
    </linearGradient>
    <radialGradient id="light-glow-yellow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8ff57" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#b8ff57" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#b8ff57" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light-glow-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#ff6b9d" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="field-ambient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b8ff57" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#b8ff57" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-yellow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect fill="url(#night-sky)" width="1920" height="1080"/>

  <!-- Pixel-art stars (small grid-aligned squares for retro feel) -->
  <g fill="#b8ff57">
    <rect x="199" y="79" width="2" height="2" opacity="0.7"/>
    <rect x="423" y="55" width="2" height="2" opacity="0.5"/>
    <rect x="607" y="113" width="2" height="2" opacity="0.8"/>
    <rect x="799" y="67" width="2" height="2" opacity="0.6"/>
    <rect x="1023" y="91" width="2" height="2" opacity="0.9"/>
    <rect x="1215" y="43" width="2" height="2" opacity="0.5"/>
    <rect x="1399" y="123" width="2" height="2" opacity="0.7"/>
    <rect x="1607" y="77" width="2" height="2" opacity="0.6"/>
    <rect x="1801" y="31" width="2" height="2" opacity="0.8"/>
    <rect x="303" y="179" width="2" height="2" opacity="0.4"/>
    <rect x="711" y="143" width="2" height="2" opacity="0.6"/>
    <rect x="1103" y="201" width="2" height="2" opacity="0.7"/>
    <rect x="1503" y="157" width="2" height="2" opacity="0.5"/>
    <rect x="99" y="251" width="2" height="2" opacity="0.4"/>
    <rect x="503" y="223" width="2" height="2" opacity="0.6"/>
    <rect x="903" y="183" width="2" height="2" opacity="0.7"/>
    <rect x="1303" y="233" width="2" height="2" opacity="0.5"/>
    <rect x="1703" y="193" width="2" height="2" opacity="0.8"/>
  </g>
  <g fill="#ff6b9d">
    <rect x="255" y="133" width="2" height="2" opacity="0.5"/>
    <rect x="655" y="87" width="2" height="2" opacity="0.6"/>
    <rect x="1055" y="161" width="2" height="2" opacity="0.4"/>
    <rect x="1455" y="97" width="2" height="2" opacity="0.7"/>
    <rect x="1855" y="141" width="2" height="2" opacity="0.5"/>
    <rect x="355" y="219" width="2" height="2" opacity="0.4"/>
    <rect x="855" y="267" width="2" height="2" opacity="0.6"/>
    <rect x="1355" y="171" width="2" height="2" opacity="0.5"/>
  </g>
  <g fill="#ffffff">
    <rect x="155" y="99" width="1" height="1" opacity="0.4"/>
    <rect x="555" y="171" width="1" height="1" opacity="0.5"/>
    <rect x="955" y="107" width="1" height="1" opacity="0.3"/>
    <rect x="1255" y="249" width="1" height="1" opacity="0.4"/>
    <rect x="1655" y="121" width="1" height="1" opacity="0.5"/>
  </g>

  <!-- Moon (pixel-art style, slightly pink-tinted) -->
  <rect x="1620" y="70" width="80" height="80" rx="40" fill="#ffe8f0" opacity="0.85"/>
  <rect x="1632" y="82" width="12" height="12" rx="6" fill="#ffc0d0" opacity="0.5"/>
  <rect x="1654" y="110" width="8" height="8" rx="4" fill="#ffc0d0" opacity="0.4"/>
  <!-- Moon glow -->
  <ellipse cx="1660" cy="110" rx="70" ry="70" fill="url(#light-glow-pink)" opacity="0.6"/>

  <!-- Cyberpunk grid lines on sky (distant city-like) -->
  <g stroke="#b8ff57" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="280" x2="1920" y2="280"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
  </g>
  <g stroke="#ff6b9d" stroke-opacity="0.03" stroke-width="1">
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="960" y1="0" x2="960" y2="450"/>
    <line x1="1440" y1="0" x2="1440" y2="450"/>
  </g>

  <!-- Stadium light towers (left) - pixel art style -->
  <!-- Left tower 1 -->
  <g>
    <rect x="148" y="310" width="24" height="190" fill="#111118"/>
    <rect x="144" y="295" width="32" height="22" fill="#1a1a28"/>
    <!-- Light housing -->
    <rect x="136" y="270" width="48" height="28" fill="#1e1e30" rx="2"/>
    <!-- Neon yellow-green lights -->
    <g filter="url(#glow-yellow)">
      <rect x="140" y="292" width="8" height="5" fill="#b8ff57" opacity="0.95"/>
      <rect x="153" y="292" width="8" height="5" fill="#b8ff57" opacity="0.95"/>
      <rect x="166" y="292" width="8" height="5" fill="#b8ff57" opacity="0.95"/>
    </g>
    <ellipse cx="160" cy="255" rx="90" ry="60" fill="url(#light-glow-yellow)" opacity="0.7"/>
  </g>
  <!-- Left tower 2 -->
  <g>
    <rect x="348" y="330" width="20" height="170" fill="#111118"/>
    <rect x="344" y="316" width="28" height="20" fill="#1a1a28"/>
    <rect x="338" y="294" width="42" height="24" fill="#1e1e30" rx="2"/>
    <g filter="url(#glow-yellow)">
      <rect x="342" y="312" width="7" height="5" fill="#7aff3a" opacity="0.95"/>
      <rect x="353" y="312" width="7" height="5" fill="#7aff3a" opacity="0.95"/>
      <rect x="364" y="312" width="7" height="5" fill="#7aff3a" opacity="0.95"/>
    </g>
    <ellipse cx="358" cy="282" rx="75" ry="50" fill="url(#light-glow-yellow)" opacity="0.6"/>
  </g>

  <!-- Stadium light towers (right) - pixel art style -->
  <!-- Right tower 1 -->
  <g>
    <rect x="1748" y="310" width="24" height="190" fill="#111118"/>
    <rect x="1744" y="295" width="32" height="22" fill="#1a1a28"/>
    <rect x="1736" y="270" width="48" height="28" fill="#1e1e30" rx="2"/>
    <g filter="url(#glow-pink)">
      <rect x="1740" y="292" width="8" height="5" fill="#ff6b9d" opacity="0.95"/>
      <rect x="1753" y="292" width="8" height="5" fill="#ff6b9d" opacity="0.95"/>
      <rect x="1766" y="292" width="8" height="5" fill="#ff6b9d" opacity="0.95"/>
    </g>
    <ellipse cx="1760" cy="255" rx="90" ry="60" fill="url(#light-glow-pink)" opacity="0.7"/>
  </g>
  <!-- Right tower 2 -->
  <g>
    <rect x="1552" y="330" width="20" height="170" fill="#111118"/>
    <rect x="1548" y="316" width="28" height="20" fill="#1a1a28"/>
    <rect x="1542" y="294" width="42" height="24" fill="#1e1e30" rx="2"/>
    <g filter="url(#glow-pink)">
      <rect x="1546" y="312" width="7" height="5" fill="#ff3d8a" opacity="0.95"/>
      <rect x="1557" y="312" width="7" height="5" fill="#ff3d8a" opacity="0.95"/>
      <rect x="1568" y="312" width="7" height="5" fill="#ff3d8a" opacity="0.95"/>
    </g>
    <ellipse cx="1562" cy="282" rx="75" ry="50" fill="url(#light-glow-pink)" opacity="0.6"/>
  </g>

  <!-- Stadium stands (pixel art - dark rows of seats) -->
  <rect x="0" y="440" width="1920" height="110" fill="#0d0d1a" opacity="0.9"/>
  <!-- Seat rows in stands -->
  <g fill="#b8ff57" opacity="0.08">
    <rect x="40" y="455" width="24" height="14" rx="1"/>
    <rect x="74" y="455" width="24" height="14" rx="1"/>
    <rect x="108" y="455" width="24" height="14" rx="1"/>
    <rect x="142" y="455" width="24" height="14" rx="1"/>
    <rect x="176" y="455" width="24" height="14" rx="1"/>
    <rect x="40" y="478" width="24" height="14" rx="1"/>
    <rect x="74" y="478" width="24" height="14" rx="1"/>
    <rect x="108" y="478" width="24" height="14" rx="1"/>
    <!-- Right side -->
    <rect x="1706" y="455" width="24" height="14" rx="1"/>
    <rect x="1740" y="455" width="24" height="14" rx="1"/>
    <rect x="1774" y="455" width="24" height="14" rx="1"/>
    <rect x="1808" y="455" width="24" height="14" rx="1"/>
    <rect x="1842" y="455" width="24" height="14" rx="1"/>
    <rect x="1706" y="478" width="24" height="14" rx="1"/>
    <rect x="1740" y="478" width="24" height="14" rx="1"/>
    <rect x="1774" y="478" width="24" height="14" rx="1"/>
  </g>
  <!-- Scoreboard (center stands) - pixel art -->
  <rect x="860" y="445" width="200" height="90" fill="#0a0a18" rx="4"/>
  <rect x="864" y="449" width="192" height="82" fill="#050510" rx="3"/>
  <!-- Scoreboard neon text simulation -->
  <g filter="url(#glow-yellow)">
    <rect x="872" y="458" width="50" height="6" fill="#b8ff57" opacity="0.8" rx="1"/>
    <rect x="930" y="458" width="30" height="6" fill="#b8ff57" opacity="0.6" rx="1"/>
    <rect x="872" y="472" width="18" height="8" fill="#ff6b9d" opacity="0.9" rx="1"/>
    <rect x="898" y="472" width="8" height="8" fill="#ff6b9d" opacity="0.7" rx="1"/>
    <rect x="914" y="472" width="18" height="8" fill="#b8ff57" opacity="0.9" rx="1"/>
    <rect x="940" y="472" width="8" height="8" fill="#b8ff57" opacity="0.7" rx="1"/>
  </g>

  <!-- Cyberpunk horizon line with neon glow -->
  <line x1="0" y1="549" x2="1920" y2="549" stroke="#b8ff57" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="0" y1="549" x2="1920" y2="549" stroke="#b8ff57" stroke-width="6" stroke-opacity="0.1"/>

  <!-- Grass field (night) -->
  <rect fill="url(#grass-night)" x="0" y="550" width="1920" height="530"/>
  <!-- Field ambient glow -->
  <ellipse cx="960" cy="750" rx="960" ry="350" fill="url(#field-ambient)" opacity="1"/>

  <!-- Grass texture (pixel-art stripes) -->
  <g fill="#b8ff57" fill-opacity="0.04">
    <rect x="0" y="550" width="1920" height="30"/>
    <rect x="0" y="620" width="1920" height="30"/>
    <rect x="0" y="690" width="1920" height="30"/>
    <rect x="0" y="760" width="1920" height="30"/>
    <rect x="0" y="830" width="1920" height="30"/>
    <rect x="0" y="900" width="1920" height="30"/>
    <rect x="0" y="970" width="1920" height="30"/>
    <rect x="0" y="1040" width="1920" height="30"/>
  </g>
  <!-- Neon grass lines -->
  <g stroke="#b8ff57" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="580" x2="1920" y2="580"/>
    <line x1="0" y1="650" x2="1920" y2="650"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="790" x2="1920" y2="790"/>
    <line x1="0" y1="860" x2="1920" y2="860"/>
    <line x1="0" y1="930" x2="1920" y2="930"/>
    <line x1="0" y1="1000" x2="1920" y2="1000"/>
  </g>

  <!-- Light beams on grass (from towers) -->
  <ellipse cx="280" cy="720" rx="260" ry="160" fill="#b8ff57" fill-opacity="0.025"/>
  <ellipse cx="1640" cy="720" rx="260" ry="160" fill="#ff6b9d" fill-opacity="0.025"/>
  <ellipse cx="960" cy="800" rx="480" ry="280" fill="#b8ff57" fill-opacity="0.015"/>

  <!-- Diamond (dirt) -->
  <polygon fill="url(#dirt-night)" points="960,600 1200,800 960,1000 720,800"/>

  <!-- Base lines (neon glow) -->
  <g filter="url(#glow-soft)">
    <line x1="960" y1="600" x2="1200" y2="800" stroke="#b8ff57" stroke-width="2.5" stroke-opacity="0.85"/>
    <line x1="1200" y1="800" x2="960" y2="1000" stroke="#b8ff57" stroke-width="2.5" stroke-opacity="0.85"/>
    <line x1="960" y1="1000" x2="720" y2="800" stroke="#b8ff57" stroke-width="2.5" stroke-opacity="0.85"/>
    <line x1="720" y1="800" x2="960" y2="600" stroke="#b8ff57" stroke-width="2.5" stroke-opacity="0.85"/>
  </g>

  <!-- Bases (pixel art squares with neon glow) -->
  <g filter="url(#glow-yellow)">
    <!-- Home plate -->
    <rect x="951" y="591" width="18" height="18" transform="rotate(45,960,600)" fill="#ffffff" opacity="0.95"/>
    <!-- 1st base (right) -->
    <rect x="1191" y="791" width="18" height="18" transform="rotate(45,1200,800)" fill="#b8ff57" opacity="0.95"/>
    <!-- 2nd base (top) -->
    <rect x="951" y="991" width="18" height="18" transform="rotate(45,960,1000)" fill="#b8ff57" opacity="0.95"/>
    <!-- 3rd base (left) -->
    <rect x="711" y="791" width="18" height="18" transform="rotate(45,720,800)" fill="#b8ff57" opacity="0.95"/>
  </g>

  <!-- Pitcher's mound (pixel art) -->
  <ellipse cx="960" cy="800" rx="36" ry="24" fill="#4a2510"/>
  <rect x="954" y="798" width="12" height="5" fill="#ffffff" opacity="0.9"/>

  <!-- Batter's box area -->
  <rect x="915" y="582" width="90" height="36" fill="#4a2510" opacity="0.7"/>
  <!-- Batter's box lines -->
  <g filter="url(#glow-soft)" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.5" fill="none">
    <rect x="920" y="584" width="36" height="28"/>
    <rect x="963" y="584" width="36" height="28"/>
  </g>

  <!-- Foul lines extended (neon) -->
  <g filter="url(#glow-soft)" stroke="#b8ff57" stroke-opacity="0.25" stroke-width="1.5">
    <line x1="960" y1="600" x2="100" y2="1080"/>
    <line x1="960" y1="600" x2="1820" y2="1080"/>
  </g>

  <!-- Warning track (pixel art dots) -->
  <g fill="#ff6b9d" fill-opacity="0.12">
    <circle cx="400" cy="1020" r="3"/>
    <circle cx="440" cy="1030" r="3"/>
    <circle cx="480" cy="1038" r="3"/>
    <circle cx="520" cy="1044" r="3"/>
    <circle cx="1400" cy="1020" r="3"/>
    <circle cx="1440" cy="1030" r="3"/>
    <circle cx="1480" cy="1038" r="3"/>
    <circle cx="1520" cy="1044" r="3"/>
  </g>

  <!-- Cyberpunk scan line overlay (very subtle) -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#night-sky)" opacity="0.0"
    style="mix-blend-mode: multiply"/>
</svg>
